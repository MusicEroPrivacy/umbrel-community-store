version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: axe-parasite-app
      APP_PORT: 3000
      JWT_SECRET: "${JWT_SECRET}"
    networks:
      - umbrel_main_network

  init:
    image: alpine:3.22.1
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}:/appdata
      - ${APP_DATA_DIR}/data/templates:/data/templates:rw
    environment:
      APPS_SUBNET: "${NETWORK_IP}/16"
      RPC_USER: "btc"
      RPC_PASSWORD: "${APP_PASSWORD}"
      BTC_P2P_PORT: "28333"
      BTC_RPC_PORT: "28332"
      BTC_ZMQ_HASHBLOCK_PORT: "28335"
      PAYOUT_ADDRESS: "CHANGEME_PARASITE_LN_ADDRESS_OR_USERNAME"
      UPSTREAM_POOL: "stratum+tcp://parasite.wtf:42069"
    command:
      - /bin/sh
      - -ec
      - |-
        set -eu
        apk add --no-cache envsubst >/dev/null

        # Persist JWT secret
        if [ -n "${JWT_SECRET:-}" ]; then
          envfile="/appdata/.env"
          tmp="/appdata/.env.tmp"
          if [ -f "$envfile" ]; then
            grep -v '^JWT_SECRET=' "$envfile" > "$tmp" || true
          else
            : > "$tmp"
          fi
          printf "JWT_SECRET=%s\n" "$JWT_SECRET" >> "$tmp"
          chmod 600 "$tmp" || true
          chown 1000:1000 "$tmp" || true
          mv "$tmp" "$envfile"
        fi

        mkdir -p /data/node /data/gateway/status /data/gateway/config

        chmod +x /data/templates/*.sh 2>/dev/null || true
        chown 1000:1000 /data/templates/*.sh 2>/dev/null || true

        touch /appdata/settings.yml
        chown 1000:1000 /appdata/settings.yml || true

        # Bitcoin node config
        if [ ! -f /data/node/bitcoin.conf ]; then
          envsubst < /data/templates/bitcoin.conf.template > /data/node/bitcoin.conf
          chown -R 1000:1000 /data/node
        else
          sed -i 's/^maxconnections=.*/maxconnections=256/' /data/node/bitcoin.conf 2>/dev/null || true
          echo 'maxconnections=256' >> /data/node/bitcoin.conf 2>/dev/null || true
          chown 1000:1000 /data/node/bitcoin.conf || true
        fi

        echo "✅ Axe-Parasite initialized | Upstream: $UPSTREAM_POOL"

  bitcoind:
    image: ghcr.io/willitmod/axebtc-bitcoind-switch:0.7.44
    user: "1000:1000"
    restart: unless-stopped
    stop_grace_period: 15m30s
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - ${APP_DATA_DIR}/data/node:/data
      - ${APP_DATA_DIR}/data/templates/bitcoind-entrypoint.sh:/bitcoind-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/bitcoind-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -datadir=/data getblockchaininfo >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 2m

  # NEW: Parasite Gateway (replaces CKPool)
  parasite-gateway:
    image: alpine:3.22.1
    user: "1000:1000"
    restart: unless-stopped
    depends_on:
      - bitcoind
    ports:
      - "7890:3333/tcp"   # Miners connect here
    environment:
      UPSTREAM_POOL: "parasite.wtf:42069"
      STATUS_DIR: "/data/gateway/status"
    volumes:
      - ${APP_DATA_DIR}/data/gateway:/data/gateway
      - ${APP_DATA_DIR}/data/templates/gateway-entrypoint.sh:/gateway-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/gateway-entrypoint.sh"]


  app:
    image: ghcr.io/willitmod/axebtc-app-umbrel-dev:0.7.82.4-dev
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 30s
    depends_on:
      - bitcoind
      - parasite-gateway
    networks:
      default:
        aliases:
          - axe-parasite-app
      umbrel_main_network:
        aliases:
          - axe-parasite-app
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      BTC_RPC_HOST: "bitcoind"
      BTC_RPC_PORT: "28332"
      BTC_RPC_USER: "btc"
      BTC_RPC_PASS: "${APP_PASSWORD}"
      POOL_STATUS_DIR: "/data/gateway/status"
      UPSTREAM_POOL: "stratum+tcp://parasite.wtf:42069"
      APP_CHANNEL: "Parasite"
      NODE_TYPE: "Libre Node"

networks:
  umbrel_main_network:
    external: true
    name: umbrel_main_network
