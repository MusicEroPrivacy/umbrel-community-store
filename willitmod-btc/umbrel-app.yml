manifestVersion: 1

id: "axe-parasite"
name: "Parasite Pool Gateway"
version: "1.0.0"
icon: "icon.png"
category: "Mining"

description: "Connected to Parasite Pool (parasite.wtf). Miners connect to your Umbrel and forward to Parasite Pool."

developer: "MusicEroPrivacy"
website: "https://github.com/MusicEroPrivacy/axe-parasite"
repo: "https://github.com/MusicEroPrivacy/axe-parasite"
support: "https://x.com/KarmaCpu"

dependencies: []

# This is the port your UI container exposes (your app container)
port: 3000

gallery:
  - "icon.png"

path: ""
defaultUsername: ""
defaultPassword: ""

widgets:
  - id: "sync"
    type: "text-with-progress"
    refresh: "5s"
    endpoint: "axe-parasite-app:3000/api/widget/sync"
    link: ""
    example:
      type: "text-with-progress"
      link: ""
      title: "Node Sync"
      text: "87%"
      progressLabel: "Syncing"
      progress: 0.87

  - id: "pool"
    type: "three-stats"
    refresh: "30s"
    endpoint: "axe-parasite-app:3000/api/widget/pool"
    link: ""
    example:
      type: "three-stats"
      link: ""
      items:
        - title: "Pool Hashrate"
          text: "12.4"
          subtext: "PH/s"
        - title: "Your Hashrate"
          text: "890"
          subtext: "GH/s"
        - title: "Workers"
          text: "3"

backupIgnore:
  - data/node/blocks
  - data/node/chainstate
  - data/node/indexes

submitter: "MusicEroPrivacy"
